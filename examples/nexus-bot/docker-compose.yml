name: nexus

services:
  telegram:
    image: ${NEXUS_BOT_IMAGE:-nexus-bot:local}
    command: [ "nexus-telegram-bot" ]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      BASE_DIR: /opt
      NEXUS_WEBHOOK_INTERNAL_URL: http://webhook:8081
      NEXUS_STORAGE_DSN: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/var/lib/nexus}:${NEXUS_RUNTIME_DIR:-/var/lib/nexus}
      - ${LOGS_DIR:-/var/lib/nexus/logs}:${LOGS_DIR:-/var/lib/nexus/logs}
      - /opt/nexus/config:/nexus-config:ro

  discord:
    image: ${NEXUS_BOT_IMAGE:-nexus-bot:local}
    command: [ "nexus-discord-bot" ]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      BASE_DIR: /opt
      NEXUS_WEBHOOK_INTERNAL_URL: http://webhook:8081
      NEXUS_STORAGE_DSN: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/var/lib/nexus}:${NEXUS_RUNTIME_DIR:-/var/lib/nexus}
      - ${LOGS_DIR:-/var/lib/nexus/logs}:${LOGS_DIR:-/var/lib/nexus/logs}
      - /opt/nexus/config:/nexus-config:ro

  processor:
    image: ${NEXUS_BOT_IMAGE:-nexus-bot:local}
    depends_on:
      - telegram
      - discord
    command: [ "nexus-processor" ]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      BASE_DIR: /opt
      NEXUS_WEBHOOK_INTERNAL_URL: http://webhook:8081
      NEXUS_STORAGE_DSN: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/var/lib/nexus}:${NEXUS_RUNTIME_DIR:-/var/lib/nexus}
      - ${LOGS_DIR:-/var/lib/nexus/logs}:${LOGS_DIR:-/var/lib/nexus/logs}
      - /opt/nexus/config:/nexus-config:ro

  webhook:
    image: ${NEXUS_BOT_IMAGE:-nexus-bot:local}
    command: [ "nexus-webhook" ]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      BASE_DIR: /opt
      WEBHOOK_PORT: "8081"
      NEXUS_STORAGE_DSN: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8081:8081"
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/var/lib/nexus}:${NEXUS_RUNTIME_DIR:-/var/lib/nexus}
      - ${LOGS_DIR:-/var/lib/nexus/logs}:${LOGS_DIR:-/var/lib/nexus/logs}
      - /opt/nexus/config:/nexus-config:ro

  health:
    image: ${NEXUS_BOT_IMAGE:-nexus-bot:local}
    depends_on:
      - telegram
      - discord
      - processor
    command: [ "nexus-health" ]
    working_dir: /app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PROJECT_CONFIG_PATH: /app/config/project_config.yaml
      BASE_DIR: /opt
      HEALTH_CHECK_PORT: "8080"
      HEALTH_CHECK_HOST: "0.0.0.0"
      NEXUS_WEBHOOK_INTERNAL_URL: http://webhook:8081
      NEXUS_STORAGE_DSN: postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    volumes:
      - ${NEXUS_RUNTIME_DIR:-/var/lib/nexus}:${NEXUS_RUNTIME_DIR:-/var/lib/nexus}
      - ${LOGS_DIR:-/var/lib/nexus/logs}:${LOGS_DIR:-/var/lib/nexus/logs}
      - /opt/nexus/config:/nexus-config:ro

  postgres:
    profiles: [ "enterprise" ]
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus-pg-data:/var/lib/postgresql/data

  redis:
    profiles: [ "enterprise" ]
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - nexus-redis-data:/data

volumes:
  nexus-pg-data:
  nexus-redis-data:
