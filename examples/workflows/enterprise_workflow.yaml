apiVersion: "nexus-arc/v1"
kind: "Workflow"
metadata:
  name: "Enterprise Workflow Router"
  description: "Router workflow for enterprise tiers."
  version: "1.0.0"

workflow_type: "orchestrator"
timeout_seconds: 3600
allowed_tools:
  - "vcs:read_issue"
  - "vcs:add_comment"

steps:
  - id: "triage"
    name: "Enterprise Tier Selection"
    description: "Classify the request and choose full, shortened, or fast-track flow"
    agent_type: "triage"
    context_policy: "minimal"          # tier-selection triage only needs current state
    tools:
      - vcs:read_issue
    inputs:
      - issue_url: "string"
      - request_context: "string"
    outputs:
      - selected_workflow: "enum[enterprise_full, enterprise_shortened, enterprise_fast_track]"
      - initial_analysis: "string"
    on_success: "dispatch"

  - id: "dispatch"
    name: "Dispatch"
    description: "Trigger the selected enterprise sub-workflow"
    agent_type: "triage"
    context_policy: "minimal"          # dispatch only reads selected_workflow to route
    inputs:
      - selected_workflow: "string"
    routes:
      - when: "selected_workflow == 'enterprise_full'"
        then: "enterprise_full_workflow"
      - when: "selected_workflow == 'enterprise_shortened'"
        then: "enterprise_shortened_workflow"
      - when: "selected_workflow == 'enterprise_fast_track'"
        then: "enterprise_fast_track_workflow"
      - default: "enterprise_full_workflow"

monitoring:
  log_all_decisions: true
  notify_human: true
