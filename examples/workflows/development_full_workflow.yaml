apiVersion: "nexus-arc/v1"
kind: "Workflow"
metadata:
  name: "Development Full Workflow"
  description: "Multi-agent workflow for processing feature requests and bug reports."
  version: "0.1.0"

workflow_type: "full"
timeout_seconds: 10800
allowed_tools:
  - "vcs:read_issue"
  - "vcs:add_comment"
  - "vcs:add_label"
  - "vcs:search_codebase"
  - "vcs:create_branch"
  - "vcs:create_file"
  - "vcs:create_pr"
  - "vcs:edit_file"
  - "vcs:review_pr"
  - "vcs:suggest_changes"
  - "vcs:request_changes"
  - "vcs:approve_pr"
  - "vcs:read_file"
  - "vcs:read_comments"

steps:
  - id: "triage"
    name: "Initial Routing"
    description: "Analyze issue and classify as bug/feature/doc, suggest priority"
    agent_type: "triage"
    context_policy: "minimal" # triage only needs current state to route
    require_api_discovery: false
    include_audit_history: false
    tools:
      - vcs:read_issue
      - vcs:add_comment
      - vcs:add_label
    inputs:
      - issue_url: "string"
    outputs:
      - classification: "enum[bug|feature|doc|support]"
      - priority: "enum[p0-critical|p1-high|p2-medium|p3-low]"
      - recommended_assignee: "string"
    on_success: "route_by_type"

  - id: "route_by_type"
    name: "Route to Specialist"
    description: "Conditional routing based on issue type"
    agent_type: "router"
    context_policy: "minimal"          # router only inspects current classification
    routes:
      - when: "classification == 'feature'"
        then: "design"
      - when: "classification == 'bug'"
        then: "debug"
      - when: "classification == 'doc'"
        then: "docs_update"
      - default: "close_loop"

  - id: "design"
    name: "Create Design Proposal"
    description: "For feature requests: create design doc in PR"
    agent_type: "design"
    context_policy: "standard"          # design reads triage output and issue context
    tools:
      - vcs:create_branch
      - vcs:create_file
      - vcs:create_pr
      - vcs:add_comment
    inputs:
      - issue_url: "string"
      - feature_description: "string"
      - scope: "enum[small|medium|large]"
    outputs:
      - design_pr_url: "string"
      - estimated_effort: "string"
    on_success: "develop"

  - id: "debug"
    name: "Debug & Root Cause Analysis"
    description: "Identify root cause, reproduction steps, and propose fix architecture"
    agent_type: "debug"
    context_policy: "standard"          # debug reads recent context to identify root cause
    tools:
      - vcs:add_comment
      - vcs:search_codebase
      - vcs:add_label
    inputs:
      - issue_url: "string"
    outputs:
      - suspected_cause: "string"
      - reproduction_steps: "string"
      - affected_versions: "list[string]"
    on_success: "develop"

  - id: "develop"
    name: "Implement Changes"
    description: "Implement code changes based on debug analysis or design proposal"
    agent_type: "developer"
    context_policy: "deep" # developer needs full audit trail and prior decisions
    include_audit_history: true
    audit_limit: 50
    tools:
      - vcs:read_issue
      - vcs:read_comments
      - vcs:add_comment
      - vcs:create_branch
      - vcs:edit_file
      - vcs:create_file
      - vcs:search_codebase
    inputs:
      - issue_url: "string"
    outputs:
      - branch_name: "string"
      - files_changed: "list[string]"
      - implementation_summary: "string"
    on_success: "review"

  - id: "review"
    name: "Review Implementation"
    description: "Review implementation quality and correctness; approve only after full regression (or equivalent full CI suite) passes"
    agent_type: "reviewer"
    context_policy: "standard"          # reviewer reads implementation summary and issue context
    tools:
      - vcs:review_pr
      - vcs:suggest_changes
      - vcs:add_comment
      - vcs:request_changes
      - vcs:approve_pr
    inputs:
      - pr_urls: "list[string]"
    outputs:
      - review_comments: "list[string]"
      - approval_status: "enum[approved|changes_requested]"
    on_success: "route_review"

  - id: "route_review"
    name: "Route After Review"
    agent_type: "router"
    context_policy: "minimal"          # router only inspects approval_status
    routes:
      - when: "approval_status == 'approved'"
        then: "close_loop"
      - default: "develop"

  - id: "docs_update"
    name: "Update Documentation"
    description: "For doc issues: update README/docs automatically"
    agent_type: "docs"
    context_policy: "standard"          # docs reads issue and recent changes for doc updates
    tools:
      - vcs:read_file
      - vcs:create_branch
      - vcs:edit_file
      - vcs:create_pr
    inputs:
      - issue_url: "string"
    outputs:
      - docs_pr_url: "string"
    on_success: "close_loop"

  - id: "close_loop"
    name: "Summarize & Close"
    description: "Final summary comment on original issue"
    agent_type: "summarizer"
    context_policy: "standard" # summarizer reads recent history to write the final comment
    audit_limit: 10
    tools:
      - vcs:add_comment
    inputs:
      - issue_url: "string"
    outputs:
      - summary: "string"
    final_step: true

monitoring:
  log_all_decisions: true
  audit_trail: "vcs_comments"
  notify_human: true
  human_approval_gates:
    - before: "create_pr"
  require_human_merge_approval: true
