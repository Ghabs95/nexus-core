apiVersion: "nexus-arc/v1"
kind: "Workflow"
metadata:
  name: "Development Workflow Router"
  description: "Router workflow for development full/shortened/fast-track tiers."
  version: "0.1.0"

workflow_type: "orchestrator"
timeout_seconds: 3600
allowed_tools:
  - "vcs:read_issue"
  - "vcs:add_comment"

require_approval_for:
  - "dispatch"

steps:
  - id: "triage"
    name: "Development Tier Selection"
    description: "Classify the request and choose full, shortened, or fast-track"
    agent_type: "triage"
    context_policy: "minimal"          # triage router only needs current state to select tier
    tools:
      - vcs:read_issue
    inputs:
      - issue_url: "string"
      - request_context: "string"
    outputs:
      - selected_workflow: "enum[development_full, development_shortened, development_fast_track]"
      - initial_analysis: "string"
    on_success: "dispatch"

  - id: "dispatch"
    name: "Dispatch"
    description: "Trigger selected development sub-workflow"
    agent_type: "triage"
    context_policy: "minimal"          # dispatch only reads selected_workflow to route
    inputs:
      - selected_workflow: "string"
    routes:
      - when: "selected_workflow == 'development_full'"
        then: "development_full_workflow"
      - when: "selected_workflow == 'development_shortened'"
        then: "development_shortened_workflow"
      - when: "selected_workflow == 'development_fast_track'"
        then: "development_fast_track_workflow"
      - default: "development_full_workflow"

monitoring:
  log_all_decisions: true
  notify_human: true
