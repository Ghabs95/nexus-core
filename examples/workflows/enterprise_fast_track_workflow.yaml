apiVersion: "nexus-arc/v1"
kind: "Workflow"
metadata:
  name: "Enterprise Fast-Track Workflow"
  description: "Critical hotfix path with emergency triage, rapid implementation, and guarded deploy."
  version: "1.0.0"

workflow_type: "fast-track"
timeout_seconds: 3600
allowed_tools:
  - "vcs:read_issue"
  - "vcs:add_label"
  - "vcs:add_comment"
  - "vcs:create_branch"
  - "vcs:commit_changes"
  - "vcs:create_pr"
  - "vcs:review_pr"
  - "vcs:approve_pr"
  - "vcs:merge_pr"
  - "vcs:create_release"
  - "vcs:close_issue"

steps:
  - id: "triage"
    name: "Emergency Triage"
    description: "Rapid assessment of the critical issue"
    agent_type: "triage"
    tools:
      - vcs:read_issue
      - vcs:add_label
      - vcs:add_comment
    inputs:
      - issue_url: "string"
    outputs:
      - urgency: "enum[critical|urgent]"
      - impact: "string"
    on_success: "develop"

  - id: "develop"
    name: "Fast-Track Implementation"
    description: "Rapidly implement minimal change"
    agent_type: "developer"
    tools:
      - vcs:create_branch
      - vcs:commit_changes
      - vcs:create_pr
      - vcs:add_comment
    inputs:
      - issue_url: "string"
      - urgency: "string"
    outputs:
      - fast_track_pr_url: "string"
      - fix_description: "string"
    on_success: "review"

  - id: "review"
    name: "Quick Verification"
    description: "Rapid review of the hotfix with full regression (or equivalent full CI suite) required before approval"
    agent_type: "reviewer"
    tools:
      - vcs:review_pr
      - vcs:approve_pr
    inputs:
      - pr_urls: "list[string]"
    outputs:
      - review_status: "enum[approved|rejected]"
    on_success: "route_review"

  - id: "route_review"
    name: "Route After Verification"
    agent_type: "router"
    routes:
      - when: "review_status == 'approved'"
        then: "deploy"
      - default: "develop"

  - id: "deploy"
    name: "Emergency Deploy"
    description: "Merge fast-track changes and deploy immediately"
    agent_type: "deployer"
    tools:
      - vcs:merge_pr
      - vcs:create_release
      - vcs:add_comment
      - vcs:close_issue
    inputs:
      - fast_track_pr_url: "string"
    outputs:
      - deployment_status: "string"
      - rollback_plan: "string"
    final_step: true

monitoring:
  log_all_decisions: true
  audit_trail: "vcs_comments"
  notify_human: true
  human_approval_gates:
    - before: "deploy"
  require_human_merge_approval: true
