apiVersion: "nexus-arc/v1"
kind: "Workflow"
metadata:
  name: "Social Media Marketing Workflow"
  description: "Dry-run-first campaign content creation, approval, and multi-platform publishing workflow."
  version: "1.0.0"

workflow_type: "social-marketing"
timeout_seconds: 10800
allowed_tools:
  - "vcs:read_issue"
  - "vcs:read_comments"
  - "vcs:add_comment"
  - "vcs:add_label"
  - "vcs:search_codebase"
  - "vcs:create_branch"
  - "vcs:create_file"
  - "vcs:edit_file"
  - "vcs:commit_changes"
  - "vcs:create_pr"
  - "vcs:review_pr"
  - "vcs:request_changes"
  - "vcs:approve_pr"
  - "vcs:merge_pr"
  - "vcs:create_release"
  - "vcs:close_issue"

steps:
  - id: "triage"
    name: "Triage & Classification"
    description: "Classify campaign request, priority, and execution path"
    agent_type: "triage"
    context_policy: "minimal"
    tools:
      - vcs:read_issue
      - vcs:add_comment
      - vcs:add_label
    inputs:
      - issue_url: "string"
    outputs:
      - classification: "enum[marketing|other]"
      - priority: "enum[p0-critical|p1-high|p2-medium|p3-low]"
      - needs_design: "boolean"
    on_success: "route_triage"

  - id: "route_triage"
    name: "Route After Triage"
    agent_type: "router"
    context_policy: "minimal"
    routes:
      - when: "classification == 'marketing' and needs_design == true"
        then: "design"
      - when: "classification == 'marketing'"
        then: "develop"
      - default: "close_rejected"

  - id: "design"
    name: "Architecture & Design"
    description: "Create a design proposal covering campaign contracts, channels, and rollout constraints"
    agent_type: "designer"
    context_policy: "standard"
    include_audit_history: true
    audit_limit: 50
    tools:
      - vcs:create_branch
      - vcs:create_file
      - vcs:create_pr
    inputs:
      - issue_url: "string"
      - classification: "string"
    outputs:
      - campaign_architecture: "string"
      - platform_plan: "list[string]"
      - estimated_effort: "string"
    on_success: "develop"

  - id: "develop"
    name: "Implementation"
    description: "Implement the workflow definition, campaign payloads, and dry-run publish contract"
    agent_type: "developer"
    context_policy: "deep"
    include_audit_history: true
    audit_limit: 50
    tools:
      - vcs:read_issue
      - vcs:read_comments
      - vcs:create_branch
      - vcs:create_file
      - vcs:edit_file
      - vcs:commit_changes
    inputs:
      - issue_url: "string"
      - platform_plan: "list[string]"
    outputs:
      - content_bundle: "list[string]"
      - implementation_notes: "string"
      - test_coverage: "string"
    on_success: "review"

  - id: "review"
    name: "Code Review"
    description: "Review implementation for correctness, quality, and standards; approve only after full regression (or equivalent full CI suite) passes"
    agent_type: "reviewer"
    context_policy: "standard"
    tools:
      - vcs:review_pr
      - vcs:request_changes
      - vcs:approve_pr
    inputs:
      - content_bundle: "list[string]"
    outputs:
      - review_status: "enum[approved|changes_requested|rejected]"
      - review_comments: "list[string]"
    on_success: "route_review"

  - id: "route_review"
    name: "Route After Review"
    agent_type: "router"
    context_policy: "minimal"
    routes:
      - when: "review_status == 'approved'"
        then: "compliance"
      - when: "review_status == 'changes_requested'"
        then: "develop"
      - default: "close_rejected"

  - id: "compliance"
    name: "Compliance & Security Review"
    description: "Validate legal/safety/privacy requirements for generated content"
    agent_type: "compliance"
    context_policy: "standard"
    require_human_approval: true
    tools:
      - vcs:review_pr
    inputs:
      - content_bundle: "list[string]"
    outputs:
      - compliance_status: "enum[approved|blocked]"
      - compliance_issues: "list[string]"
    on_success: "route_compliance"

  - id: "route_compliance"
    name: "Route After Compliance"
    agent_type: "router"
    context_policy: "minimal"
    routes:
      - when: "compliance_status == 'approved'"
        then: "deploy"
      - default: "develop"

  - id: "deploy"
    name: "Merge & Deploy"
    description: "Publish approved content via platform integrations, defaulting to dry-run until adapters are production ready"
    agent_type: "deployer"
    context_policy: "standard"
    require_human_approval: true
    tools:
      - vcs:merge_pr
      - vcs:create_release
    inputs:
      - content_bundle: "list[string]"
    outputs:
      - deployment_status: "string"
      - publish_results: "list[string]"
    on_success: "close_loop"

  - id: "close_loop"
    name: "Document & Close"
    description: "Update docs, summarize campaign outcomes, and close the issue"
    agent_type: "writer"
    context_policy: "standard"
    tools:
      - vcs:create_file
      - vcs:edit_file
      - vcs:close_issue
    inputs:
      - issue_url: "string"
      - publish_results: "list[string]"
    outputs:
      - documentation_url: "string"
      - campaign_summary: "string"
    final_step: true

  - id: "close_rejected"
    name: "Close Rejected Issue"
    description: "Post rejection summary when review/compliance cannot pass"
    agent_type: "finalizer"
    context_policy: "minimal"
    tools:
      - vcs:close_issue
    inputs:
      - issue_url: "string"
      - review_comments: "list[string]"
    final_step: true

monitoring:
  log_all_decisions: true
  audit_trail: "vcs_comments"
  notify_human: true
  require_human_merge_approval: true
