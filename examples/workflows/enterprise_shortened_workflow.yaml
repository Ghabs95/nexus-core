apiVersion: "nexus-arc/v1"
kind: "Workflow"
metadata:
  name: "Enterprise Shortened Workflow"
  description: "Expedited enterprise delivery pipeline with rapid debug, review, and deploy."
  version: "1.0.0"

workflow_type: "shortened"
timeout_seconds: 7200
allowed_tools:
  - "vcs:read_issue"
  - "vcs:add_comment"
  - "vcs:add_label"
  - "vcs:search_codebase"
  - "vcs:read_file"
  - "vcs:create_branch"
  - "vcs:commit_changes"
  - "vcs:create_pr"
  - "vcs:review_pr"
  - "vcs:approve_pr"
  - "vcs:merge_pr"
  - "vcs:create_release"
  - "vcs:close_issue"

steps:
  - id: "triage"
    name: "Intake & Triage"
    description: "Classify priority, scope, and affected components"
    agent_type: "triage"
    context_policy: "minimal"          # triage only needs current state to route
    tools:
      - vcs:read_issue
      - vcs:add_label
      - vcs:add_comment
    inputs:
      - issue_url: "string"
    outputs:
      - severity: "enum[critical|high|medium|low]"
      - priority: "enum[p0|p1|p2|p3]"
    on_success: "debug"

  - id: "debug"
    name: "Root Cause Analysis"
    description: "Investigate the issue and identify root cause"
    agent_type: "debug"
    context_policy: "standard"          # debug reads recent context to identify root cause
    tools:
      - vcs:search_codebase
      - vcs:read_file
      - vcs:add_comment
    inputs:
      - issue_url: "string"
      - severity: "string"
    outputs:
      - root_cause: "string"
      - affected_components: "list[string]"
      - fix_approach: "string"
    on_success: "develop"

  - id: "develop"
    name: "Implement Change"
    description: "Implement the change and open a PR"
    agent_type: "developer"
    context_policy: "deep"             # developer needs full audit trail and debug findings
    include_audit_history: true
    audit_limit: 50
    tools:
      - vcs:create_branch
      - vcs:commit_changes
      - vcs:create_pr
    inputs:
      - issue_url: "string"
      - root_cause: "string"
      - fix_approach: "string"
    outputs:
      - fix_pr_url: "string"
      - test_coverage: "string"
    on_success: "review"

  - id: "review"
    name: "Verify Change"
    description: "Review the change for correctness and approve only after full regression (or equivalent full CI suite) passes"
    agent_type: "reviewer"
    context_policy: "standard"          # reviewer reads implementation and issue context
    tools:
      - vcs:review_pr
      - vcs:approve_pr
      - vcs:add_comment
    inputs:
      - pr_urls: "list[string]"
    outputs:
      - review_status: "enum[approved|changes_requested]"
    on_success: "route_review"

  - id: "route_review"
    name: "Route After Verification"
    agent_type: "router"
    context_policy: "minimal"          # router only inspects review_status
    routes:
      - when: "review_status == 'approved'"
        then: "deploy"
      - default: "develop"

  - id: "deploy"
    name: "Deploy Change"
    description: "Merge the change and create a release"
    agent_type: "deployer"
    context_policy: "standard"          # deployer needs recent approvals and PR context
    tools:
      - vcs:merge_pr
      - vcs:create_release
      - vcs:add_comment
    inputs:
      - fix_pr_url: "string"
    outputs:
      - deployment_status: "string"
    on_success: "close_loop"

  - id: "close_loop"
    name: "Document & Close"
    description: "Write summary and close the issue"
    agent_type: "writer"
    context_policy: "standard"          # writer reads recent history for postmortem and docs
    audit_limit: 10
    tools:
      - vcs:add_comment
      - vcs:close_issue
    inputs:
      - issue_url: "string"
      - root_cause: "string"
    outputs:
      - postmortem: "string"
    final_step: true

monitoring:
  log_all_decisions: true
  audit_trail: "vcs_comments"
  notify_human: true
  human_approval_gates:
    - before: "deploy"
  require_human_merge_approval: true
